<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>OBMC Intramurals 2026 - Create Account</title>
</head>
<body class="d-flex justify-content-center align-items-center vh-100" style="background-color: #f8f9fa;">
    <div class="card shadow p-4" style="width: 350px;">
        <h3 class="text-center mb-4">Create Account</h3>
        <form>
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Username">
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password">
            </div>
            <div class="d-grid">
                <button type="button" py-click="account_creation" class="btn btn-primary">Sign up</button>
            </div>
        </form>
        <div id="output" class="mt-3 text-center text-danger small"></div>
    </div>
    <py-script src="main.py"></py-script>
</body>
</html>
