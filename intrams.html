<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Intramurals Checker</title>
    <style>
        body { background-color: #e9ecef; }
        .card { border-radius: 15px; }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4 w-50">
        <h2 class="text-center mb-4">Intramurals Eligibility</h2>
        <form>
            <div class="mb-3">
                <label class="form-label">Are you done with the online registration?</label><br>
                <input type="radio" name="registration" value="registered"> Yes
                <input type="radio" name="registration" value="notRegistered" class="ms-2"> No
            </div>
            <div class="mb-3">
                <label class="form-label">Do you have medical clearance?</label><br>
                <input type="radio" name="clearance" value="cleared"> Yes
                <input type="radio" name="clearance" value="notCleared" class="ms-2"> No
            </div>
            <div class="mb-3">
                <label class="form-label">Grade & Section</label>
                <select id="grade_section" class="form-select">
                    <option value='7emerald'>7-Emerald</option>
                    <option value='7ruby'>7-Ruby</option>
                    <option value='8emerald'>8-Emerald</option>
                    <option value='8ruby'>8-Ruby</option>
                    <option value='9emerald'>9-Emerald</option>
                    <option value='9ruby'>9-Ruby</option>
                    <option value='10emerald'>10-Emerald</option>
                    <option value='10ruby'>10-Ruby</option>
                </select>
            </div>
            <div class="d-grid">
                <button type="button" py-click="intrams_checker" class="btn btn-success">Check Team</button>
            </div>
        </form>
        <div id="output" class="mt-3 text-center fw-bold"></div>
        <div id="image" class="mt-3 text-center"></div>
    </div>
    <py-script src="main.py"></py-script>
</body>
</html>
